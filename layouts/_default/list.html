{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
<ul class="post-list">
  {{ range .Pages.ByDate.Reverse }}
  <li>
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    <span class="meta">{{ .Date.Format "2006-01-02" }}</span>
    {{ if .Description }}<p class="desc">{{ .Description }}</p>{{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
