{{ define "main" }}
<article class="home">
  {{ .Content }}
  <h2>Recent Posts</h2>
  <ul class="post-list">
    {{ range (where site.RegularPages "Section" "posts").ByDate.Reverse }}
    <li>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      <span class="meta">{{ .Date.Format "2006-01-02" }}</span>
      {{ if .Description }}<p class="desc">{{ .Description }}</p>{{ end }}
    </li>
    {{ end }}
  </ul>
</article>
{{ end }}
